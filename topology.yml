name: redteam-pentest-kali

hosts:
  - name: kali
    base_box:
      image: kali
      man_user: debian
    flavor: m1.medium

  - name: target
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: m1.small

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: m1.small

networks:
  - name: attacker-net
    cidr: 10.1.30.0/24
    accessible_by_user: true

  - name: target-net
    cidr: 10.1.31.0/24
    accessible_by_user: false

net_mappings:
  - host: kali
    network: attacker-net
    ip: 10.1.30.5

  - host: target
    network: target-net
    ip: 10.1.31.10

router_mappings:
  - router: router
    network: attacker-net
    ip: 10.1.30.1

  - router: router
    network: target-net
    ip: 10.1.31.1

groups: []
